name: Build & Commit

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        run: gh release create ${{ github.ref_name }} --title "${{ github.ref_name }}" --notes "Automated build for ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

  build-pwa:
    needs: create-release
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '22'
      - run: npm install
      - run: npx quasar build -m pwa
      - name: Debug dist paths
        run: ls -R dist/
      - name: Package PWA for release
        run: tar -czf pwa-dist.tar.gz -C dist pwa
      - name: Upload PWA to release
        run: gh release upload ${{ github.ref_name }} pwa-dist.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
      - name: Deploy PWA to Surge
        run: |
          npm install -g surge@0.27.3
          export SURGE_TOKEN=935aec63550df73f541822b03ea28d26
          surge dist/pwa --domain=${{ github.event.repository.name }}.huclin.surge.sh
          surge dist/pwa --domain=${{ github.event.repository.name }}.surge.sh
      - name: Commit PWA build
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Build: PWA [tag: ${{ github.ref_name }}]" -m "Co-Authored-By: Warp <agent@warp.dev>" || true
          git pull --rebase origin main
          git push origin HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-capacitor-android:
    needs: create-release
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '22'
      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'
      - run: npm install
      - run: npx quasar build -m capacitor -T android
      - name: Debug dist paths
        run: ls -R dist/
      - name: Upload Android APK to release
        run: gh release upload ${{ github.ref_name }} dist/capacitor/android/apk/release/app-release-unsigned.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

  build-capacitor-ios:
    needs: create-release
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '22'
      - run: npm install
      - run: npx quasar build -m capacitor -T ios -- --buildFlag="-sdk iphonesimulator" --buildFlag="-configuration Debug" CODE_SIGNING_ALLOWED=NO
      - name: Debug dist paths
        run: ls -R dist/
      - name: Package iOS simulator app for release
        run: ditto -c -k --sequesterRsrc --keepParent dist/capacitor/ios/Build/Products/Release-iphoneos/App.app App-ios-simulator.zip
      - name: Upload iOS simulator app to release
        run: gh release upload ${{ github.ref_name }} App-ios-simulator.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

  build-electron-ubuntu:
    needs: create-release
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '22'
      - run: npm install
      - run: npx quasar build -m electron -T linux -A all
      - name: Debug dist paths
        run: ls -R dist/
      - name: Package Linux electron builds for release
        run: |
          tar -czf electron-linux-arm64.tar.gz -C dist/electron/Packaged "Quasar App-linux-arm64"
          tar -czf electron-linux-armv7l.tar.gz -C dist/electron/Packaged "Quasar App-linux-armv7l"
          tar -czf electron-linux-x64.tar.gz -C dist/electron/Packaged "Quasar App-linux-x64"
      - name: Upload Linux electron builds to release
        run: gh release upload ${{ github.ref_name }} electron-linux-arm64.tar.gz electron-linux-armv7l.tar.gz electron-linux-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

  build-electron-macos:
    needs: create-release
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '22'
      - run: npm install
      - run: npx quasar build -m electron -T darwin -A all
      - name: Debug dist paths
        run: ls -R dist/
      - name: Package macOS electron builds for release
        run: |
          ditto -c -k --sequesterRsrc --keepParent dist/electron/Packaged/Quasar\ App-darwin-arm64 electron-darwin-arm64.zip
          ditto -c -k --sequesterRsrc --keepParent dist/electron/Packaged/Quasar\ App-darwin-universal electron-darwin-universal.zip
          ditto -c -k --sequesterRsrc --keepParent dist/electron/Packaged/Quasar\ App-darwin-x64 electron-darwin-x64.zip
      - name: Upload macOS electron builds to release
        run: gh release upload ${{ github.ref_name }} electron-darwin-arm64.zip electron-darwin-universal.zip electron-darwin-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

  build-electron-windows:
    needs: create-release
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '22'
      - run: npm install
      - run: npx quasar build -m electron -T win32 -A all
      - name: Debug dist paths
        run: ls -R dist/
      - name: Package Windows electron builds for release
        run: |
          Compress-Archive -Path "dist/electron/Packaged/Quasar App-win32-arm64" -DestinationPath "electron-win32-arm64.zip"
          Compress-Archive -Path "dist/electron/Packaged/Quasar App-win32-ia32" -DestinationPath "electron-win32-ia32.zip"
          Compress-Archive -Path "dist/electron/Packaged/Quasar App-win32-x64" -DestinationPath "electron-win32-x64.zip"
      - name: Upload Windows electron builds to release
        run: gh release upload ${{ github.ref_name }} electron-win32-arm64.zip electron-win32-ia32.zip electron-win32-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

